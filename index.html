// ---------- Canvas setup ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let viewScale = 1;
let dpr = window.devicePixelRatio || 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const targetRatio = LOGICAL_W / LOGICAL_H;
  const screenRatio = vw / vh;
  let cssW, cssH;
  if (screenRatio > targetRatio) {
    cssH = vh;
    cssW = vh * targetRatio;
  } else {
    cssW = vw;
    cssH = vw / targetRatio;
  }
  canvas.style.width = cssW + "px";
  canvas.style.height = cssH + "px";
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  viewScale = canvas.width / LOGICAL_W;
}
window.addEventListener("resize", resize);
resize();

// ---------- Input ----------
const input = { tapped: false, tapX: 0, tapY: 0, held: false };

function screenToLogical(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = ((clientX - rect.left) / rect.width) * LOGICAL_W;
  const y = ((clientY - rect.top) / rect.height) * LOGICAL_H;
  return { x, y };
}

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (e.touches.length > 0) {
    const t = e.touches[0];
    const p = screenToLogical(t.clientX, t.clientY);
    input.tapped = true;
    input.held = true;
    input.tapX = p.x;
    input.tapY = p.y;
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  if (e.touches.length === 0) input.held = false;
}, { passive: false });

canvas.addEventListener("touchcancel", (e) => {
  if (e.touches.length === 0) input.held = false;
});

canvas.addEventListener("mousedown", (e) => {
  const p = screenToLogical(e.clientX, e.clientY);
  input.tapped = true;
  input.held = true;
  input.tapX = p.x;
  input.tapY = p.y;
});

window.addEventListener("mouseup", () => { input.held = false; });

// ---------- Game state ----------
const STATE = {
  PLAYING: "playing",
  LEVEL_CLEAR: "level_clear",
  GAME_OVER: "game_over"
};

let game;

function newGame(level = 1) {
  game = {
    state: STATE.PLAYING,
    level: level,
    time: 0,
    thomas: {
      x: LOGICAL_W / 2,
      y: (ROAD_TOP + ROAD_BOTTOM) / 2,
      angle: Math.random() * Math.PI * 2,
      changeDirTimer: randRange(2, 4),
      weight: WEIGHT_START,
      anim: "walk",
      munchTimer: 0,
      hitTimer: 0,
      walkPhase: 0,
      facing: 0 // visual facing -1 left, 0 forward, 1 right
    },
    foods: [],
    foodSpawnTimer: 0,
    foodInterval: foodIntervalForLevel(level),
    powerups: [],
    powerupSpawnTimer: POWERUP_INTERVAL,
    rapidFireRemaining: 0,
    projectiles: [],
    pendulum: {
      angle: 0,
      phase: 0,
      cooldownMs: 0
    },
    cafe: null,
    cafeSpawnTimer: randRange(CAFE_BASE_INTERVAL_MIN, CAFE_BASE_INTERVAL_MAX) / cafeRateMul(level),
    cutscene: null,
    particles: [],
    confetti: [],
    flashAlpha: 0,
    shakeT: 0,
    overlayTimer: 0
  };
}

function foodIntervalForLevel(level) { return FOOD_BASE_INTERVAL / (1 + 0.20 * (level - 1)); }
function pendulumPeriodForLevel(level) { return PEND_BASE_PERIOD / (1 + 0.25 * (level - 1)); }
function walkSpeedForLevel(level) { return THOMAS_BASE_WALK * (1 + 0.10 * (level - 1)); }
function cafeRateMul(level) { return 1 + 0.15 * (level - 1); }

newGame(1);

// ---------- Utility ----------
function randRange(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

function thomasBodyWidth(weight) {
  const t = clamp((weight - 80) / 50, 0, 1);
  return lerp(THOMAS_W_AT_80, THOMAS_W_AT_130, t);
}
function thomasWalkSpeed() {
  const baseSpeed = walkSpeedForLevel(game.level);
  const t = clamp((game.thomas.weight - 80) / 50, 0, 1);
  const factor = lerp(1.0, 0.55, t);
  return baseSpeed * factor;
}
function thomasCollideR(weight) {
  return thomasBodyWidth(weight) * 0.45;
}

// ---------- Food ----------
function spawnFood() {
  if (game.foods.length >= FOOD_MAX_ONFIELD) return;
  const r = Math.random();
  const lvl = game.level;
  let kapsalonP = lvl >= 5 ? 0.10 : 0.05;
  let pizzaP    = lvl >= 5 ? 0.35 : 0.25;
  let kind;
  if (r < kapsalonP) kind = "kapsalon";
  else if (r < kapsalonP + pizzaP) kind = "pizza";
  else kind = "hamburger";
  const kg = kind === "kapsalon" ? 3 : kind === "pizza" ? 2 : 1;

  // pick a position on the road, but not too close to Thomas
  let x, y;
  for (let tries = 0; tries < 12; tries++) {
    x = randRange(ROAD_LEFT + 20, ROAD_RIGHT - 20);
    y = randRange(ROAD_TOP + 20, ROAD_BOTTOM - 30);
    const dx = x - game.thomas.x, dy = y - game.thomas.y;
    if (dx * dx + dy * dy > 70 * 70) break;
  }
  game.foods.push({
    x, y,
    kind, kg,
    r: FOOD_RADIUS,
    bobPhase: Math.random() * Math.PI * 2,
    spawnT: 0
  });
}

// ---------- Power-up (golden Ozempic 2mg) ----------
function spawnPowerup() {
  const x = randRange(ROAD_LEFT + 20, ROAD_RIGHT - 20);
  const y = randRange(ROAD_TOP + 20, ROAD_BOTTOM - 30);
  game.powerups.push({
    x, y,
    r: POWERUP_RADIUS,
    spawnT: 0,
    bobPhase: Math.random() * Math.PI * 2
  });
}

function updatePowerups(dt) {
  // Spawn timer
  game.powerupSpawnTimer -= dt;
  if (game.powerupSpawnTimer <= 0) {
    spawnPowerup();
    game.powerupSpawnTimer = POWERUP_INTERVAL;
  }
  // Lifetime + pickup
  const t = game.thomas;
  const tR = thomasCollideR(t.weight);
  for (let i = game.powerups.length - 1; i >= 0; i--) {
    const p = game.powerups[i];
    p.bobPhase += dt * 3;
    p.spawnT += dt;
    const dx = p.x - t.x, dy = p.y - t.y;
    if (dx * dx + dy * dy < (tR + p.r * 0.6) * (tR + p.r * 0.6)) {
      game.rapidFireRemaining = RAPID_FIRE_DURATION;
      game.pendulum.cooldownMs = 0;
      spawnMunchParticles(p.x, p.y - 20);
      game.powerups.splice(i, 1);
      continue;
    }
    if (p.spawnT >= POWERUP_LIFETIME) {
      game.powerups.splice(i, 1);
    }
  }
  // Rapid-fire countdown
  if (game.rapidFireRemaining > 0) {
    game.rapidFireRemaining = Math.max(0, game.rapidFireRemaining - dt);
  }
}

// ---------- Cafe ----------
function spawnCafe() {
  // pick rest position on the road so Thomas can walk into it
  const restX = randRange(ROAD_LEFT + CAFE_W / 2 + 10, ROAD_RIGHT - CAFE_W / 2 - 10);
  const restY = randRange(ROAD_TOP + 20, ROAD_BOTTOM - CAFE_H - 20);
  // pick entry edge (top or side, not bottom because launcher is there)
  const edge = Math.floor(Math.random() * 3); // 0 top, 1 left, 2 right
  let startX, startY;
  if (edge === 0) { startX = restX; startY = ROAD_TOP - CAFE_H - 10; }
  else if (edge === 1) { startX = -CAFE_W - 10; startY = restY; }
  else { startX = LOGICAL_W + 10; startY = restY; }
  game.cafe = {
    x: startX,
    y: startY,
    targetX: restX,
    targetY: restY,
    state: "sliding_in",
    timer: CAFE_SLIDE_TIME,
    stay: randRange(CAFE_STAY_MIN, CAFE_STAY_MAX),
    entry: edge,
    puffT: 0
  };
}

// ---------- Loop ----------
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  if (dt > 0.05) dt = 0.05;
  last = now;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });

function update(dt) {
  game.time += dt;

  if (game.state === STATE.PLAYING) {
    updatePlaying(dt);
  } else if (game.state === STATE.LEVEL_CLEAR) {
    updateConfetti(dt);
    if (input.tapped && game.overlayTimer > 0.4) newGame(game.level + 1);
    game.overlayTimer += dt;
  } else if (game.state === STATE.GAME_OVER) {
    updateParticles(dt);
    game.shakeT = Math.max(0, game.shakeT - dt);
    game.flashAlpha = Math.max(0, game.flashAlpha - dt * 4);
    if (input.tapped && game.overlayTimer > 0.6) newGame(1);
    game.overlayTimer += dt;
  }

  input.tapped = false;
}

function updatePlaying(dt) {
  const t = game.thomas;

  // Cutscene
  if (game.cutscene && game.cutscene.kind === "beer") {
    updateBeerCutscene(dt);
    updatePendulumOnly(dt);
    updateProjectiles(dt);
    updateFoodsBob(dt);
    updateParticles(dt);
    return;
  }

  // Thomas 2D wander
  t.changeDirTimer -= dt;
  if (t.changeDirTimer <= 0) {
    // small angle change rather than fully random for nicer movement
    t.angle += randRange(-Math.PI * 0.6, Math.PI * 0.6);
    t.changeDirTimer = randRange(1.6, 3.0);
  }
  const sp = thomasWalkSpeed();
  let nvx = Math.cos(t.angle) * sp;
  let nvy = Math.sin(t.angle) * sp;
  t.x += nvx * dt;
  t.y += nvy * dt;
  t.walkPhase += dt * 6 * (sp / THOMAS_BASE_WALK);

  // facing direction (visual mirroring small for character)
  if (Math.abs(nvx) > 5) t.facing = nvx > 0 ? 1 : -1;
  else t.facing = 0;

  // Bounce off road bounds (keeps Thomas on the street, off the sidewalks)
  const r = thomasCollideR(t.weight);
  if (t.x - r < ROAD_LEFT) { t.x = ROAD_LEFT + r; t.angle = Math.PI - t.angle; }
  if (t.x + r > ROAD_RIGHT) { t.x = ROAD_RIGHT - r; t.angle = Math.PI - t.angle; }
  if (t.y - r < ROAD_TOP) { t.y = ROAD_TOP + r; t.angle = -t.angle; }
  if (t.y + r > ROAD_BOTTOM - 10) { t.y = ROAD_BOTTOM - 10 - r; t.angle = -t.angle; }

  // anim
  if (t.munchTimer > 0) t.munchTimer -= dt;
  if (t.hitTimer > 0) t.hitTimer -= dt;
  if (t.hitTimer > 0) t.anim = "shirt-lift";
  else if (t.munchTimer > 0) t.anim = "munch";
  else t.anim = "walk";

  // Pendulum
  updatePendulumOnly(dt);

  // Shoot — during rapid-fire, auto-fire while button is held with very short cooldown
  const isRapid = game.rapidFireRemaining > 0;
  const fireRequested = isRapid ? input.held : input.tapped;
  if (fireRequested && game.pendulum.cooldownMs <= 0 && !game.cutscene) {
    const ang = game.pendulum.angle - Math.PI / 2;
    const vx = Math.cos(ang) * SHOT_SPEED;
    const vy = Math.sin(ang) * SHOT_SPEED;
    const x0 = PAD_CENTER_X + Math.cos(ang) * PEND_LEN;
    const y0 = PAD_CENTER_Y + Math.sin(ang) * PEND_LEN;
    game.projectiles.push({ x: x0, y: y0, vx, vy, r: SHOT_RADIUS, ang });
    game.pendulum.cooldownMs = isRapid ? RAPID_FIRE_COOLDOWN_MS : SHOT_COOLDOWN_MS;
  }

  updateProjectiles(dt);
  updateFoodsBob(dt);
  updatePowerups(dt);
  checkFoodEats();

  // Food spawn
  game.foodSpawnTimer += dt;
  if (game.foodSpawnTimer >= game.foodInterval) {
    game.foodSpawnTimer = 0;
    game.foodInterval = foodIntervalForLevel(game.level) * randRange(0.7, 1.3);
    spawnFood();
  }

  // Cafe
  if (!game.cafe) {
    game.cafeSpawnTimer -= dt;
    if (game.cafeSpawnTimer <= 0) spawnCafe();
  } else {
    updateCafe(dt);
  }

  updateParticles(dt);

  if (t.weight >= WEIGHT_LOSE) triggerGameOver();
  else if (t.weight <= WEIGHT_WIN) triggerLevelClear();
}

const FOOD_LIFETIME = 10; // seconds before uncollected food disappears

function updateFoodsBob(dt) {
  for (let i = game.foods.length - 1; i >= 0; i--) {
    const f = game.foods[i];
    f.bobPhase += dt * 3;
    f.spawnT += dt;
    if (f.spawnT >= FOOD_LIFETIME) {
      game.foods.splice(i, 1);
    }
  }
}

function checkFoodEats() {
  const t = game.thomas;
  const r = thomasCollideR(t.weight);
  for (let i = game.foods.length - 1; i >= 0; i--) {
    const f = game.foods[i];
    const dx = f.x - t.x, dy = f.y - t.y;
    if (dx * dx + dy * dy < (r + f.r * 0.6) * (r + f.r * 0.6)) {
      t.weight += f.kg;
      t.munchTimer = 0.28;
      spawnMunchParticles(t.x, t.y - 50);
      game.foods.splice(i, 1);
    }
  }
}

function updatePendulumOnly(dt) {
  const p = game.pendulum;
  const period = pendulumPeriodForLevel(game.level);
  p.phase += dt / period * Math.PI * 2;
  p.angle = Math.sin(p.phase) * PEND_MAX_ANGLE;
  if (p.cooldownMs > 0) p.cooldownMs -= dt * 1000;
}

function updateProjectiles(dt) {
  const t = game.thomas;
  for (let i = game.projectiles.length - 1; i >= 0; i--) {
    const p = game.projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // cafe collision
    if (game.cafe && (game.cafe.state === "idle" || game.cafe.state === "sliding_in")) {
      const c = game.cafe;
      if (p.x > c.x - CAFE_W / 2 && p.x < c.x + CAFE_W / 2 && p.y > c.y && p.y < c.y + CAFE_H) {
        c.state = "dying";
        c.puffT = 0;
        spawnPuffParticles(c.x, c.y + CAFE_H / 2);
        game.projectiles.splice(i, 1);
        continue;
      }
    }

    // thomas collision (circle around upper body center)
    const tcx = t.x;
    const tcy = t.y - THOMAS_BODY_H * 0.45;
    const tR = thomasCollideR(t.weight) + 12;
    const dx = p.x - tcx, dy = p.y - tcy;
    if (dx * dx + dy * dy < tR * tR) {
      t.weight = Math.max(WEIGHT_WIN, t.weight - 2);
      t.hitTimer = 0.5;
      t.anim = "shirt-lift";
      spawnHitParticles(p.x, p.y);
      game.projectiles.splice(i, 1);
      continue;
    }

    if (p.y < FIELD_TOP - 30 || p.y > LOGICAL_H + 30 || p.x < -30 || p.x > LOGICAL_W + 30) {
      game.projectiles.splice(i, 1);
    }
  }
}

function updateCafe(dt) {
  const c = game.cafe;
  if (c.state === "sliding_in") {
    const sx = (c.targetX - c.x) / Math.max(0.01, c.timer);
    const sy = (c.targetY - c.y) / Math.max(0.01, c.timer);
    c.x += sx * dt;
    c.y += sy * dt;
    c.timer -= dt;
    if (c.timer <= 0) { c.x = c.targetX; c.y = c.targetY; c.state = "idle"; c.timer = c.stay; }
    checkCafeThomasCollision();
  } else if (c.state === "idle") {
    c.timer -= dt;
    if (c.timer <= 0) { c.state = "sliding_out"; c.timer = CAFE_SLIDE_TIME; }
    checkCafeThomasCollision();
  } else if (c.state === "sliding_out") {
    const exit = exitPos(c.entry);
    const sx = (exit.x - c.x) / Math.max(0.01, c.timer);
    const sy = (exit.y - c.y) / Math.max(0.01, c.timer);
    c.x += sx * dt;
    c.y += sy * dt;
    c.timer -= dt;
    if (c.timer <= 0) {
      game.cafe = null;
      game.cafeSpawnTimer = randRange(CAFE_BASE_INTERVAL_MIN, CAFE_BASE_INTERVAL_MAX) / cafeRateMul(game.level);
    }
  } else if (c.state === "dying") {
    c.puffT += dt;
    if (c.puffT > 0.3) {
      game.cafe = null;
      game.cafeSpawnTimer = randRange(CAFE_BASE_INTERVAL_MIN, CAFE_BASE_INTERVAL_MAX) / cafeRateMul(game.level);
    }
  }
}

function exitPos(entry) {
  if (entry === 0) return { x: 0, y: FIELD_TOP - CAFE_H - 20 };
  if (entry === 1) return { x: -CAFE_W - 20, y: 0 };
  return { x: LOGICAL_W + 20, y: 0 };
}

function checkCafeThomasCollision() {
  if (game.cutscene) return;
  const c = game.cafe;
  const t = game.thomas;
  // simple bbox/circle: thomas inside expanded cafe box
  const r = thomasCollideR(t.weight);
  if (
    t.x + r > c.x - CAFE_W / 2 &&
    t.x - r < c.x + CAFE_W / 2 &&
    t.y > c.y + CAFE_H * 0.3 &&
    t.y < c.y + CAFE_H + 20
  ) {
    startBeerCutscene();
  }
}

function startBeerCutscene() {
  game.cutscene = {
    kind: "beer",
    t: 0,
    gulp: 0,
    weightTickAdded: 0,
    cafeX: game.cafe.x,
    cafeY: game.cafe.y
  };
  game.cafe.state = "dying";
  game.cafe.puffT = 0;
  game.thomas.anim = "drinking-beer";
}

function updateBeerCutscene(dt) {
  const cs = game.cutscene;
  cs.t += dt * 1000;
  if (cs.t < BEER_PER_GULP_MS) cs.gulp = 1;
  else if (cs.t < BEER_PER_GULP_MS * 2) cs.gulp = 2;
  else if (cs.t < BEER_PER_GULP_MS * 3) cs.gulp = 3;
  else cs.gulp = 4;

  const targetAdd = Math.floor(clamp(cs.t / BEER_TOTAL_MS, 0, 1) * 5);
  if (targetAdd > cs.weightTickAdded) {
    game.thomas.weight += (targetAdd - cs.weightTickAdded);
    cs.weightTickAdded = targetAdd;
  }
  if (cs.t >= BEER_TOTAL_MS) {
    const remainder = 5 - cs.weightTickAdded;
    if (remainder > 0) game.thomas.weight += remainder;
    game.cutscene = null;
    game.thomas.anim = "walk";
  }
}

// ---------- Particles ----------
function spawnMunchParticles(x, y) {
  for (let i = 0; i < 5; i++) {
    game.particles.push({
      x, y, vx: randRange(-80, 80), vy: randRange(-160, -40),
      g: 380, life: 0.5, age: 0, color: C.hamPatty, size: 4
    });
  }
}
function spawnHitParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    game.particles.push({
      x, y, vx: randRange(-140, 140), vy: randRange(-180, 30),
      g: 380, life: 0.5, age: 0, color: "#FFE07A", size: 5
    });
  }
}
function spawnPuffParticles(x, y) {
  for (let i = 0; i < 14; i++) {
    game.particles.push({
      x, y, vx: randRange(-90, 90), vy: randRange(-90, -10),
      g: 30, life: 0.6, age: 0, color: "#DDDDDD", size: 7
    });
  }
}
function updateParticles(dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.age += dt;
    if (p.age >= p.life) { game.particles.splice(i, 1); continue; }
    p.vy += p.g * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
}

function updateConfetti(dt) {
  for (let i = 0; i < 2; i++) {
    game.confetti.push({
      x: randRange(0, LOGICAL_W), y: -10,
      vx: randRange(-40, 40), vy: randRange(80, 180),
      rot: randRange(0, Math.PI * 2), vrot: randRange(-4, 4),
      life: 4, age: 0,
      color: ["#E63946","#F2C94C","#3ECF7A","#2A6DF4","#F291C3"][Math.floor(Math.random() * 5)]
    });
  }
  for (let i = game.confetti.length - 1; i >= 0; i--) {
    const c = game.confetti[i];
    c.age += dt;
    if (c.age >= c.life || c.y > LOGICAL_H + 20) { game.confetti.splice(i, 1); continue; }
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.vrot * dt;
  }
}

// ---------- Triggers ----------
function triggerLevelClear() {
  game.state = STATE.LEVEL_CLEAR;
  game.overlayTimer = 0;
  game.confetti = [];
  setHighscoreIfBetter(game.level);
}
function triggerGameOver() {
  game.state = STATE.GAME_OVER;
  game.overlayTimer = 0;
  game.shakeT = 0.4;
  game.flashAlpha = 1;
  for (let i = 0; i < 22; i++) {
    game.particles.push({
      x: game.thomas.x, y: game.thomas.y - 60,
      vx: randRange(-300, 300), vy: randRange(-450, -120),
      g: 500, life: 1.5, age: 0,
      color: i % 3 === 0 ? C.hamCheese : i % 3 === 1 ? C.hamPatty : C.hamBun,
      size: 8
    });
  }
}

// ---------- Render ----------
function render() {
  ctx.setTransform(viewScale, 0, 0, viewScale, 0, 0);
  if (game.shakeT > 0) {
    const m = game.shakeT * 20;
    ctx.translate((Math.random() - 0.5) * m, (Math.random() - 0.5) * m);
  }

  drawBackground();

  // collect z-sorted entities
  const entities = [];
  for (const f of game.foods) entities.push({ kind: "food", obj: f, sortY: f.y + f.r });
  for (const p of game.powerups) entities.push({ kind: "powerup", obj: p, sortY: p.y + p.r });
  if (game.cafe) entities.push({ kind: "cafe", obj: game.cafe, sortY: game.cafe.y + CAFE_H });
  entities.push({ kind: "thomas", obj: game.thomas, sortY: game.thomas.y });
  entities.sort((a, b) => a.sortY - b.sortY);
  for (const e of entities) {
    if (e.kind === "food") drawFood(e.obj);
    else if (e.kind === "powerup") drawPowerup(e.obj);
    else if (e.kind === "cafe") drawCafe(e.obj);
    else if (e.kind === "thomas") drawThomas(e.obj);
  }

  drawProjectiles();
  drawParticles();
  drawPad();
  drawHUD();

  if (game.state === STATE.LEVEL_CLEAR) drawLevelClear();
  if (game.state === STATE.GAME_OVER) drawGameOver();

  if (game.flashAlpha > 0) {
    ctx.globalAlpha = game.flashAlpha;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
    ctx.globalAlpha = 1;
  }
}

function drawBackground() {
  if (backgroundReady) {
    ctx.drawImage(backgroundImg, 0, 0, LOGICAL_W, LOGICAL_H);
  } else {
    ctx.fillStyle = C.sky;
    ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  }
}

function drawField() {
  // tiled plaza
  const tileSize = 60;
  for (let y = FIELD_TOP; y < FIELD_BOTTOM; y += tileSize) {
    for (let x = 0; x < LOGICAL_W; x += tileSize) {
      const ix = Math.floor(x / tileSize);
      const iy = Math.floor((y - FIELD_TOP) / tileSize);
      ctx.fillStyle = (ix + iy) % 2 === 0 ? C.fieldTile1 : C.fieldTile2;
      ctx.fillRect(x, y, tileSize, tileSize);
    }
  }
  // tile gridlines (subtle)
  ctx.strokeStyle = "rgba(0,0,0,0.10)";
  ctx.lineWidth = 1;
  for (let y = FIELD_TOP; y <= FIELD_BOTTOM; y += tileSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(LOGICAL_W, y); ctx.stroke();
  }
  for (let x = 0; x <= LOGICAL_W; x += tileSize) {
    ctx.beginPath(); ctx.moveTo(x, FIELD_TOP); ctx.lineTo(x, FIELD_BOTTOM); ctx.stroke();
  }
  // snackbar wall (background decor at top of field)
  ctx.fillStyle = "#C58F69";
  ctx.fillRect(0, FIELD_TOP, LOGICAL_W, 28);
  ctx.fillStyle = "#A57050";
  ctx.fillRect(0, FIELD_TOP + 28, LOGICAL_W, 6);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, FIELD_TOP + 34);
  ctx.lineTo(LOGICAL_W, FIELD_TOP + 34);
  ctx.stroke();
  // luifel
  ctx.fillStyle = "#E63946";
  ctx.fillRect(LOGICAL_W / 2 - 110, FIELD_TOP - 4, 220, 22);
  ctx.strokeRect(LOGICAL_W / 2 - 110, FIELD_TOP - 4, 220, 22);
  // sign
  ctx.fillStyle = "#FFD976";
  ctx.fillRect(LOGICAL_W / 2 - 80, FIELD_TOP + 18, 160, 18);
  ctx.strokeRect(LOGICAL_W / 2 - 80, FIELD_TOP + 18, 160, 18);
  ctx.fillStyle = C.outline;
  ctx.font = "900 14px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("SNACKBAR THOMAS", LOGICAL_W / 2, FIELD_TOP + 27);

  // small decorations (bushes)
  drawBush(45, FIELD_TOP + 55);
  drawBush(LOGICAL_W - 45, FIELD_TOP + 55);
  drawBush(35, FIELD_BOTTOM - 30);
  drawBush(LOGICAL_W - 35, FIELD_BOTTOM - 30);

  // field outline
  ctx.strokeStyle = C.fieldEdge;
  ctx.lineWidth = 4;
  ctx.strokeRect(2, FIELD_TOP + 36, LOGICAL_W - 4, FIELD_BOTTOM - FIELD_TOP - 36);
  ctx.lineWidth = 3;
}

function drawBush(x, y) {
  ctx.fillStyle = "#3E8B4A";
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x - 9, y, 13, 0, Math.PI * 2);
  ctx.arc(x + 9, y - 2, 13, 0, Math.PI * 2);
  ctx.arc(x, y - 9, 13, 0, Math.PI * 2);
  ctx.arc(x, y + 4, 12, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // highlight
  ctx.fillStyle = "#5BAB66";
  ctx.beginPath(); ctx.arc(x - 3, y - 7, 4, 0, Math.PI * 2); ctx.fill();
}

function drawFood(f) {
  const bob = Math.sin(f.bobPhase) * 2;
  const scaleIn = clamp(f.spawnT / 0.25, 0, 1);
  // Fade out in the final second before timeout
  const fade = clamp((FOOD_LIFETIME - f.spawnT) / 1, 0, 1);
  ctx.globalAlpha = fade;
  // shadow
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(f.x, f.y + f.r - 4, f.r * 0.7, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(f.x, f.y - 6 + bob);
  ctx.scale(scaleIn, scaleIn);
  drawFoodSprite(f.kind, f.r);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawFoodSprite(kind, r) {
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  if (kind === "hamburger") {
    if (hamburgerReady) {
      const s = r * 2.2;
      ctx.drawImage(hamburgerImg, -s / 2, -s / 2, s, s);
      return;
    }
    // bun bottom (fallback procedural)
    ctx.fillStyle = C.hamBun;
    ctx.beginPath(); ctx.arc(0, r * 0.4, r, 0, Math.PI, false); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = C.hamLettuce;
    ctx.fillRect(-r, -2, r * 2, 6); ctx.strokeRect(-r, -2, r * 2, 6);
    ctx.fillStyle = C.hamPatty;
    ctx.fillRect(-r, -10, r * 2, 8); ctx.strokeRect(-r, -10, r * 2, 8);
    ctx.fillStyle = C.hamBun;
    ctx.beginPath(); ctx.arc(0, -10, r, Math.PI, 0, false); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-r * 0.4, -r * 0.6, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -r * 0.7, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.4, -r * 0.6, 2, 0, Math.PI * 2); ctx.fill();
  } else if (kind === "pizza") {
    if (pizzaReady) {
      const s = r * 2.2;
      ctx.drawImage(pizzaImg, -s / 2, -s / 2, s, s);
      return;
    }
    ctx.beginPath();
    ctx.moveTo(-r, r * 0.6); ctx.lineTo(r, r * 0.6); ctx.lineTo(0, -r); ctx.closePath();
    ctx.fillStyle = C.pizzaSauce; ctx.fill();
    ctx.fillStyle = C.pizzaCrust;
    ctx.fillRect(-r, r * 0.4, r * 2, 8); ctx.strokeRect(-r, r * 0.4, r * 2, 8);
    ctx.beginPath();
    ctx.moveTo(-r, r * 0.6); ctx.lineTo(r, r * 0.6); ctx.lineTo(0, -r); ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = C.pizzaCheese;
    ctx.beginPath(); ctx.arc(-4, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-2, 10, 3, 0, Math.PI * 2); ctx.fill();
  } else if (kind === "kapsalon") {
    ctx.fillStyle = "#888";
    ctx.beginPath(); ctx.rect(-r, -r * 0.4, r * 2, r * 1.2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = C.kapsalonFries;
    ctx.fillRect(-r + 3, -r * 0.4 + 4, r * 2 - 6, r * 0.5);
    ctx.strokeRect(-r + 3, -r * 0.4 + 4, r * 2 - 6, r * 0.5);
    ctx.fillStyle = C.kapsalonMeat;
    ctx.fillRect(-r + 4, -r * 0.4 + 4 + r * 0.5, r * 2 - 8, r * 0.35);
    ctx.strokeRect(-r + 4, -r * 0.4 + 4 + r * 0.5, r * 2 - 8, r * 0.35);
    ctx.fillStyle = C.kapsalonCheese;
    ctx.fillRect(-r + 5, -r * 0.4 + 4 + r * 0.5 + r * 0.35, r * 2 - 10, 5);
    ctx.strokeRect(-r + 5, -r * 0.4 + 4 + r * 0.5 + r * 0.35, r * 2 - 10, 5);
    ctx.fillStyle = C.kapsalonSauce;
    ctx.fillRect(-r + 8, -r * 0.4, 5, 4);
    ctx.fillRect(r - 12, -r * 0.4, 5, 4);
  }
}

function drawPowerup(p) {
  const bob = Math.sin(p.bobPhase) * 3;
  const scaleIn = clamp(p.spawnT / 0.25, 0, 1);
  const fade = clamp((POWERUP_LIFETIME - p.spawnT) / 1, 0, 1);
  ctx.globalAlpha = fade;

  // Pulsing golden glow halo behind the syringe
  const pulse = 0.5 + 0.5 * Math.sin(game.time * 6);
  const glowR = p.r * (1.6 + pulse * 0.4);
  const grad = ctx.createRadialGradient(p.x, p.y - 6 + bob, 4, p.x, p.y - 6 + bob, glowR);
  grad.addColorStop(0, "rgba(255, 215, 0, 0.55)");
  grad.addColorStop(1, "rgba(255, 215, 0, 0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(p.x, p.y - 6 + bob, glowR, 0, Math.PI * 2);
  ctx.fill();

  // Shadow
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + p.r - 4, p.r * 0.7, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Golden syringe (mirrors drawSyringe shape, recolored gold)
  ctx.save();
  ctx.translate(p.x, p.y - 6 + bob);
  ctx.scale(scaleIn, scaleIn);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  // needle
  ctx.fillStyle = "#E8C200";
  ctx.beginPath();
  ctx.moveTo(-2, -42); ctx.lineTo(2, -42); ctx.lineTo(2, -22); ctx.lineTo(-2, -22);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // needle tip
  ctx.beginPath();
  ctx.moveTo(0, -46); ctx.lineTo(3, -42); ctx.lineTo(-3, -42);
  ctx.closePath();
  ctx.fillStyle = "#D4A800";
  ctx.fill(); ctx.stroke();
  // cylinder (gold)
  ctx.fillStyle = POWERUP_GOLD;
  ctx.beginPath();
  ctx.rect(-10, -22, 20, 30);
  ctx.fill(); ctx.stroke();
  // darker gold band
  ctx.fillStyle = "#E8B800";
  ctx.beginPath();
  ctx.rect(-10, -16, 20, 18);
  ctx.fill(); ctx.stroke();
  // "2mg" label
  ctx.fillStyle = "#3A2A00";
  ctx.font = "900 9px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("2mg", 0, -7);
  // plunger
  ctx.fillStyle = "#B8860B";
  ctx.beginPath(); ctx.rect(-8, 8, 16, 6); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.rect(-3, 14, 6, 10); ctx.fill(); ctx.stroke();
  ctx.restore();

  ctx.globalAlpha = 1;
}

function drawCafe(c) {
  const x = c.x - CAFE_W / 2;
  const y = c.y;
  let a = 1;
  if (c.state === "dying") a = 1 - clamp(c.puffT / 0.3, 0, 1);
  ctx.globalAlpha = a;
  // shadow
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(c.x, y + CAFE_H - 4, CAFE_W * 0.5, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // facade
  ctx.fillStyle = C.cafeWood;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.rect(x, y + 28, CAFE_W, CAFE_H - 28);
  ctx.fill(); ctx.stroke();
  // wood vertical planks
  ctx.strokeStyle = "rgba(0,0,0,0.20)";
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const px = x + (CAFE_W / 5) * i;
    ctx.beginPath(); ctx.moveTo(px, y + 30); ctx.lineTo(px, y + CAFE_H - 2); ctx.stroke();
  }
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  // roof triangle
  ctx.beginPath();
  ctx.moveTo(x - 10, y + 28);
  ctx.lineTo(c.x, y);
  ctx.lineTo(x + CAFE_W + 10, y + 28);
  ctx.closePath();
  ctx.fillStyle = C.cafeWoodDark; ctx.fill(); ctx.stroke();
  // sign
  ctx.fillStyle = C.cafeGold;
  ctx.beginPath(); ctx.rect(x + 14, y + 40, CAFE_W - 28, 28); ctx.fill(); ctx.stroke();
  ctx.fillStyle = C.outline;
  ctx.font = "900 20px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("CAFÃ‰", c.x, y + 54);
  // window
  ctx.fillStyle = C.cafeWindow;
  ctx.beginPath(); ctx.rect(x + 18, y + 80, 45, 50); ctx.fill(); ctx.stroke();
  // window crossbars
  ctx.beginPath(); ctx.moveTo(x + 18 + 22, y + 80); ctx.lineTo(x + 18 + 22, y + 130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 18, y + 105); ctx.lineTo(x + 63, y + 105); ctx.stroke();
  // door
  ctx.fillStyle = "#3A2418";
  ctx.beginPath(); ctx.rect(x + 75, y + 80, 40, 70); ctx.fill(); ctx.stroke();
  // doorknob
  ctx.fillStyle = C.cafeGold;
  ctx.beginPath(); ctx.arc(x + 110, y + 116, 3, 0, Math.PI * 2); ctx.fill();

  ctx.globalAlpha = 1;
}

// ---------- Thomas rendering ----------
const TC = {
  skin: "#EAC0A4",
  skinShade: "#C99B7E",
  skinDeep: "#A87858",
  skinHigh: "#F5D5BC",
  hair: "#3A2820",
  hairShade: "#231510",
  hairHigh: "#5A3F2F",
  beard: "#2E1F18",
  beardEdge: "#180E0A",
  beardHigh: "#4A3328",
  shirtRed: "#E63946",
  shirtRedShade: "#B12330",
  shirtRedHigh: "#F25563",
  shirtWhite: "#FFFFFF",
  shirtWhiteShade: "#DCDCD8",
  shirtBlack: "#1A1A1A",
  pants: "#22232A",
  pantsShade: "#11121A",
  pantsHigh: "#33343D",
  shoe: "#0A0A0A",
  shoeWhite: "#FFFFFF",
  outline: "#1A1A1A"
};

function drawThomas(t) {
  const bodyW = thomasBodyWidth(t.weight);
  const halfW = bodyW / 2;
  const x = t.x;
  const y = t.y;

  // ground shadow
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(x, y - 2, halfW * 0.95, THOMAS_FEET_RY, 0, 0, Math.PI * 2);
  ctx.fill();

  if (game.state === STATE.GAME_OVER) { drawThomasExplodingPose(x, y, halfW); return; }
  if (game.state === STATE.LEVEL_CLEAR) { drawThomasVictoryPose(x, y, halfW, t); return; }
  if (t.anim === "drinking-beer") { drawThomasDrinking(x, y, halfW, t); return; }

  drawThomasNormal(x, y, halfW, t);
}

function drawThomasNormal(x, y, halfW, t) {
  ctx.save();
  ctx.translate(x, y);

  const legH = 46;
  const torsoH = 72;
  const neckH = 14;
  const headR = lerp(32, 40, clamp((t.weight - 80) / 50, 0, 1));
  const legTopY = -legH;
  const torsoTopY = legTopY - torsoH;
  const headCenterY = torsoTopY - neckH - headR * 0.95;

  // subtle body bob during walk
  const bob = Math.sin(t.walkPhase * 2) * 0.9;
  ctx.translate(0, bob);

  drawThomasLegs(halfW, legTopY, legH, t);
  drawThomasTorso(halfW, torsoTopY, torsoH, t);
  drawThomasArms(halfW, torsoTopY, torsoH, t);
  drawThomasNeck(0, torsoTopY, neckH);
  drawThomasHead(0, headCenterY, headR, t);

  ctx.restore();
}

function drawThomasLegs(halfW, legTopY, legH, t) {
  const swing = Math.sin(t.walkPhase) * 5;
  const legW = 20;
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.translate(halfW * 0.34 * side, legTopY);
    ctx.rotate(swing * 0.025 * (-side));

    // pants base
    ctx.fillStyle = TC.pants;
    roundedRect(-legW / 2, 0, legW, legH, 7);
    ctx.fill();

    // pants shading (clipped inside)
    ctx.save();
    ctx.beginPath();
    roundedRect(-legW / 2, 0, legW, legH, 7);
    ctx.clip();
    // shadow side
    ctx.fillStyle = TC.pantsShade;
    ctx.fillRect(legW / 2 - 6, 0, 6, legH);
    // outer-edge highlight
    ctx.fillStyle = TC.pantsHigh;
    ctx.fillRect(-legW / 2 + 2, 4, 2, legH - 14);
    // knee crease line
    ctx.strokeStyle = "rgba(0,0,0,0.30)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-legW / 2 + 3, legH * 0.56);
    ctx.quadraticCurveTo(0, legH * 0.62, legW / 2 - 3, legH * 0.52);
    ctx.stroke();
    // pocket hint
    ctx.beginPath();
    const pX = side > 0 ? legW / 2 - 2 : -legW / 2 + 2;
    ctx.moveTo(pX, 6);
    ctx.lineTo(pX - 5 * side, 16);
    ctx.stroke();
    ctx.restore();

    // outline
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 3;
    roundedRect(-legW / 2, 0, legW, legH, 7);
    ctx.stroke();

    drawShoe(0, legH + 4);
    ctx.restore();
  }
}

function drawShoe(cx, cy) {
  // shoe body
  ctx.fillStyle = TC.shoe;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx - 13, cy - 1);
  ctx.quadraticCurveTo(cx - 15, cy + 5, cx - 11, cy + 8);
  ctx.lineTo(cx + 14, cy + 8);
  ctx.quadraticCurveTo(cx + 17, cy + 5, cx + 14, cy - 1);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // tongue/throat darker top
  ctx.fillStyle = "#161616";
  ctx.beginPath();
  ctx.moveTo(cx - 9, cy - 1);
  ctx.quadraticCurveTo(cx, cy - 5, cx + 9, cy - 1);
  ctx.lineTo(cx + 9, cy + 3);
  ctx.lineTo(cx - 9, cy + 3);
  ctx.closePath();
  ctx.fill();
  // laces
  ctx.strokeStyle = "#777";
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(cx - 5, cy - 1 + i * 1.5);
    ctx.lineTo(cx + 5, cy - 1 + i * 1.5);
    ctx.stroke();
  }
  // white sole
  ctx.fillStyle = TC.shoeWhite;
  ctx.fillRect(cx - 14, cy + 8, 32, 3);
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;
  ctx.strokeRect(cx - 14, cy + 8, 32, 3);
  // side accent
  ctx.fillStyle = TC.shoeWhite;
  ctx.fillRect(cx + 7, cy + 1, 4, 7);
  // shine highlight
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  ctx.fillRect(cx - 11, cy + 1, 4, 2);
}

function drawThomasTorso(halfW, torsoY, torsoH, t) {
  // base full red
  ctx.fillStyle = TC.shirtRed;
  roundedRect(-halfW, torsoY, halfW * 2, torsoH, 16);
  ctx.fill();

  // stripes clipped
  ctx.save();
  ctx.beginPath();
  roundedRect(-halfW, torsoY, halfW * 2, torsoH, 16);
  ctx.clip();
  const stripeCount = 5;
  const stripeW = (halfW * 2) / stripeCount;
  for (let i = 0; i < stripeCount; i++) {
    ctx.fillStyle = (i % 2 === 0) ? TC.shirtRed : TC.shirtWhite;
    ctx.fillRect(-halfW + i * stripeW, torsoY, stripeW, torsoH);
  }
  // chest highlight (upper-left soft bulge)
  ctx.fillStyle = "rgba(255,255,255,0.18)";
  ctx.beginPath();
  ctx.ellipse(-halfW * 0.55, torsoY + 14, halfW * 0.38, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  // upper rim highlight
  ctx.fillStyle = "rgba(255,255,255,0.13)";
  ctx.fillRect(-halfW, torsoY, halfW * 2, 5);
  // right side shadow (cell shaded)
  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.fillRect(halfW - 18, torsoY, 18, torsoH);
  // lower belly shadow
  ctx.fillStyle = "rgba(0,0,0,0.17)";
  ctx.fillRect(-halfW, torsoY + torsoH - 16, halfW * 2, 16);

  // fabric fold lines
  ctx.strokeStyle = "rgba(0,0,0,0.25)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-halfW + 8, torsoY + 24);
  ctx.quadraticCurveTo(-halfW * 0.5, torsoY + torsoH * 0.65, -halfW * 0.15, torsoY + torsoH - 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(halfW - 8, torsoY + 24);
  ctx.quadraticCurveTo(halfW * 0.5, torsoY + torsoH * 0.65, halfW * 0.15, torsoY + torsoH - 6);
  ctx.stroke();
  // belly horizontal fold
  ctx.beginPath();
  ctx.moveTo(-halfW + 10, torsoY + torsoH * 0.73);
  ctx.quadraticCurveTo(0, torsoY + torsoH * 0.80, halfW - 10, torsoY + torsoH * 0.73);
  ctx.stroke();
  ctx.restore();

  // outline silhouette
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;
  roundedRect(-halfW, torsoY, halfW * 2, torsoH, 16);
  ctx.stroke();

  // V-neck collar
  ctx.fillStyle = TC.shirtBlack;
  ctx.beginPath();
  ctx.moveTo(-18, torsoY - 2);
  ctx.lineTo(18, torsoY - 2);
  ctx.lineTo(12, torsoY + 5);
  ctx.lineTo(0, torsoY + 22);
  ctx.lineTo(-12, torsoY + 5);
  ctx.closePath();
  ctx.fill();
  // inner skin reveal
  ctx.fillStyle = TC.skin;
  ctx.beginPath();
  ctx.moveTo(-12, torsoY);
  ctx.lineTo(12, torsoY);
  ctx.lineTo(0, torsoY + 18);
  ctx.closePath();
  ctx.fill();
  // collar outlines
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-18, torsoY - 2);
  ctx.lineTo(0, torsoY + 22);
  ctx.lineTo(18, torsoY - 2);
  ctx.moveTo(-12, torsoY);
  ctx.lineTo(0, torsoY + 18);
  ctx.lineTo(12, torsoY);
  ctx.stroke();

  // sponsor text
  if (t.anim !== "shirt-lift") {
    ctx.fillStyle = TC.outline;
    ctx.font = "900 11px Arial Black, Impact, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("SNACKBAR", 0, torsoY + torsoH * 0.50);
    ctx.fillText("THOMAS", 0, torsoY + torsoH * 0.50 + 13);
  }

  // shirt-lift overlay
  if (t.anim === "shirt-lift") {
    // belly base
    const bellyTop = torsoY + torsoH * 0.45;
    const bellyH = torsoH * 0.55;
    ctx.fillStyle = TC.skin;
    ctx.beginPath();
    ctx.ellipse(0, bellyTop + bellyH * 0.55, halfW * 0.92, bellyH * 0.62, 0, 0, Math.PI * 2);
    ctx.fill();
    // belly shadow + highlight
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, bellyTop + bellyH * 0.55, halfW * 0.92, bellyH * 0.62, 0, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = TC.skinShade;
    ctx.beginPath();
    ctx.ellipse(0, bellyTop + bellyH * 0.85, halfW * 0.85, bellyH * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = TC.skinHigh;
    ctx.beginPath();
    ctx.ellipse(-halfW * 0.30, bellyTop + bellyH * 0.25, halfW * 0.28, bellyH * 0.20, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // belly button
    ctx.fillStyle = TC.skinDeep;
    ctx.beginPath();
    ctx.arc(0, bellyTop + bellyH * 0.55, 4, 0, Math.PI * 2);
    ctx.fill();
    // belly outline
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, bellyTop + bellyH * 0.55, halfW * 0.92, bellyH * 0.62, 0, 0, Math.PI * 2);
    ctx.stroke();

    // bunched shirt on top
    ctx.fillStyle = TC.shirtRed;
    roundedRect(-halfW, torsoY, halfW * 2, torsoH * 0.45, 16);
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    roundedRect(-halfW, torsoY, halfW * 2, torsoH * 0.45, 16);
    ctx.clip();
    for (let i = 0; i < stripeCount; i++) {
      ctx.fillStyle = (i % 2 === 0) ? TC.shirtRed : TC.shirtWhite;
      ctx.fillRect(-halfW + i * stripeW, torsoY, stripeW, torsoH * 0.45);
    }
    ctx.restore();
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 3;
    roundedRect(-halfW, torsoY, halfW * 2, torsoH * 0.45, 16);
    ctx.stroke();
    // bunched edge shadow
    ctx.fillStyle = "rgba(0,0,0,0.30)";
    ctx.fillRect(-halfW, torsoY + torsoH * 0.40, halfW * 2, 5);
  }
}

function drawThomasArms(halfW, torsoY, torsoH, t) {
  const swing = Math.sin(t.walkPhase) * 7;
  const shoulderY = torsoY + 12;
  const sleeveH = 32;
  const armH = 26;

  for (const side of [-1, 1]) {
    ctx.save();
    ctx.translate((halfW - 5) * side, shoulderY);
    ctx.rotate(swing * 0.028 * (-side));

    // SLEEVE
    const sleeveW = 24;
    ctx.fillStyle = TC.shirtRed;
    roundedRect(-sleeveW / 2, 0, sleeveW, sleeveH, 8);
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    roundedRect(-sleeveW / 2, 0, sleeveW, sleeveH, 8);
    ctx.clip();
    // accent white stripe
    ctx.fillStyle = TC.shirtWhite;
    ctx.fillRect(-sleeveW / 2 + 7, 0, 6, sleeveH);
    // bicep shadow
    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.fillRect(sleeveW / 2 - 7, 0, 7, sleeveH);
    // shoulder highlight
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.beginPath();
    ctx.ellipse(-sleeveW / 2 + 5, 6, 4, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // black cuff
    ctx.fillStyle = TC.shirtBlack;
    ctx.fillRect(-sleeveW / 2, sleeveH - 6, sleeveW, 6);
    // outline
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 3;
    roundedRect(-sleeveW / 2, 0, sleeveW, sleeveH, 8);
    ctx.stroke();

    // FOREARM
    ctx.fillStyle = TC.skin;
    roundedRect(-8, sleeveH, 16, armH, 6);
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    roundedRect(-8, sleeveH, 16, armH, 6);
    ctx.clip();
    ctx.fillStyle = TC.skinShade;
    ctx.fillRect(3, sleeveH + 2, 5, armH - 4);
    ctx.fillStyle = TC.skinHigh;
    ctx.fillRect(-7, sleeveH + 2, 2, armH - 4);
    // muscle curve line
    ctx.strokeStyle = TC.skinShade;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-3, sleeveH + 6);
    ctx.quadraticCurveTo(0, sleeveH + armH * 0.5, 2, sleeveH + armH - 7);
    ctx.stroke();
    // arm hairs hint
    ctx.strokeStyle = "rgba(50,30,15,0.45)";
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(-6 + i * 3, sleeveH + 6 + i * 3);
      ctx.lineTo(-6 + i * 3 + 1, sleeveH + 9 + i * 3);
      ctx.stroke();
    }
    ctx.restore();
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 3;
    roundedRect(-8, sleeveH, 16, armH, 6);
    ctx.stroke();

    // HAND
    const handY = sleeveH + armH + 8;
    ctx.fillStyle = TC.skin;
    ctx.beginPath();
    ctx.arc(0, handY, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, handY, 9, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = TC.skinShade;
    ctx.beginPath();
    ctx.arc(3, handY + 2, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = TC.skinHigh;
    ctx.beginPath();
    ctx.arc(-3, handY - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    // knuckle lines
    ctx.strokeStyle = TC.skinShade;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-4 + i * 3, handY + 4);
      ctx.lineTo(-4 + i * 3, handY + 7);
      ctx.stroke();
    }
    ctx.restore();
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, handY, 9, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }
}

function drawThomasNeck(cx, torsoTopY, neckH) {
  ctx.fillStyle = TC.skin;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.rect(cx - 13, torsoTopY - neckH, 26, neckH + 2);
  ctx.fill(); ctx.stroke();
  ctx.save();
  ctx.beginPath();
  ctx.rect(cx - 13, torsoTopY - neckH, 26, neckH + 2);
  ctx.clip();
  // shadow under jaw
  ctx.fillStyle = TC.skinShade;
  ctx.fillRect(cx - 13, torsoTopY - 6, 26, 8);
  // left highlight
  ctx.fillStyle = TC.skinHigh;
  ctx.fillRect(cx - 11, torsoTopY - neckH, 3, neckH);
  // collarbone line
  ctx.strokeStyle = "rgba(0,0,0,0.28)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 11, torsoTopY - 1);
  ctx.quadraticCurveTo(cx, torsoTopY + 2, cx + 11, torsoTopY - 1);
  ctx.stroke();
  // adam's apple
  ctx.fillStyle = TC.skinShade;
  ctx.beginPath();
  ctx.arc(cx + 1, torsoTopY - neckH * 0.5, 1.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawThomasHead(cx, cy, r, t) {
  if (thomasHeadReady) {
    // Image-based head: scale to match the procedural bounding box
    // (chin near cy + r*1.15, top of hair near cy - r*1.55).
    const imgH = r * 2.7;
    const imgW = imgH; // source is 256x256
    const bottomY = cy + r * 1.15;
    const topY = bottomY - imgH;
    const leftX = cx - imgW / 2;
    ctx.drawImage(thomasHeadImg, leftX, topY, imgW, imgH);
    return;
  }

  // Ears (back layer)
  ctx.fillStyle = TC.skin;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.93 * s, cy + r * 0.05, r * 0.17, r * 0.27, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = TC.skinShade;
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.93 * s, cy + r * 0.10, r * 0.08, r * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = TC.skin;
  }

  // Face shape
  const fW = r * 0.96;
  const fH = r * 1.10;
  ctx.fillStyle = TC.skin;
  ctx.beginPath();
  ctx.ellipse(cx, cy, fW, fH, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face shading
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, fW, fH, 0, 0, Math.PI * 2);
  ctx.clip();
  // shadow right
  ctx.fillStyle = TC.skinShade;
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.50, cy + r * 0.10, r * 0.55, r * 1.05, 0, 0, Math.PI * 2);
  ctx.fill();
  // cheek highlight left
  ctx.fillStyle = TC.skinHigh;
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.42, cy + r * 0.10, r * 0.22, r * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // forehead highlight
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.08, cy - r * 0.36, r * 0.30, r * 0.20, 0, 0, Math.PI * 2);
  ctx.fill();
  // rosy cheeks
  ctx.fillStyle = "rgba(220,110,95,0.32)";
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.42, cy + r * 0.18, r * 0.17, r * 0.11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.42, cy + r * 0.20, r * 0.15, r * 0.10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // face outline
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, fW, fH, 0, 0, Math.PI * 2);
  ctx.stroke();

  drawDetailedBeard(cx, cy, r);
  drawDetailedHair(cx, cy, r);
  drawDetailedFace(cx, cy, r, t);
  drawMustache(cx, cy, r);
}

function drawDetailedHair(cx, cy, r) {
  ctx.fillStyle = TC.hair;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;

  const browY = cy - r * 0.30;
  const bumps = 9;

  function tracePath() {
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.93, browY + r * 0.05);
    ctx.lineTo(cx - r * 0.95, browY - r * 0.40);
    for (let i = 0; i <= bumps; i++) {
      const t = i / bumps;
      const px = cx + lerp(-r * 0.95, r * 0.95, t);
      const topY = cy - r * 1.18 + Math.sin(t * Math.PI) * -r * 0.04;
      ctx.bezierCurveTo(
        px - r * 0.10, topY + r * 0.08,
        px - r * 0.04, topY - r * 0.05,
        px + r * 0.04, topY + r * 0.02
      );
    }
    ctx.lineTo(cx + r * 0.95, browY - r * 0.40);
    ctx.lineTo(cx + r * 0.93, browY + r * 0.05);
    // forehead hairline (subtle widow's peak feel)
    ctx.bezierCurveTo(
      cx + r * 0.55, browY + r * 0.14,
      cx + r * 0.22, browY - r * 0.04,
      cx + r * 0.05, browY + r * 0.07
    );
    ctx.quadraticCurveTo(cx, browY + r * 0.14, cx - r * 0.05, browY + r * 0.07);
    ctx.bezierCurveTo(
      cx - r * 0.22, browY - r * 0.04,
      cx - r * 0.55, browY + r * 0.14,
      cx - r * 0.93, browY + r * 0.05
    );
    ctx.closePath();
  }

  tracePath();
  ctx.fill(); ctx.stroke();

  // shading
  ctx.save();
  tracePath();
  ctx.clip();
  // right side shadow
  ctx.fillStyle = TC.hairShade;
  ctx.fillRect(cx + r * 0.10, cy - r * 1.30, r * 1.0, r * 1.40);
  // bottom hairline rim shadow
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(cx - r, browY - 4, r * 2, 6);

  // curl strokes (texture)
  ctx.strokeStyle = TC.hairShade;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  const curls = [
    [-r * 0.55, -r * 0.90, -r * 0.40, -r * 0.55],
    [-r * 0.32, -r * 1.05, -r * 0.12, -r * 0.65],
    [-r * 0.02, -r * 1.10, r * 0.18, -r * 0.65],
    [r * 0.22, -r * 0.98, r * 0.42, -r * 0.60],
    [r * 0.45, -r * 0.85, r * 0.60, -r * 0.50],
    [-r * 0.75, -r * 0.55, -r * 0.60, -r * 0.25],
    [r * 0.65, -r * 0.55, r * 0.80, -r * 0.30]
  ];
  for (const c of curls) {
    ctx.beginPath();
    ctx.moveTo(cx + c[0], cy + c[1]);
    ctx.quadraticCurveTo(cx + (c[0] + c[2]) / 2 + 2, cy + (c[1] + c[3]) / 2 - 4, cx + c[2], cy + c[3]);
    ctx.stroke();
  }
  // highlight strokes
  ctx.strokeStyle = TC.hairHigh;
  ctx.lineWidth = 1.5;
  const hi = [
    [-r * 0.35, -r * 0.90, -r * 0.20, -r * 0.65],
    [-r * 0.05, -r * 0.98, r * 0.10, -r * 0.70],
    [r * 0.28, -r * 0.88, r * 0.38, -r * 0.65]
  ];
  for (const c of hi) {
    ctx.beginPath();
    ctx.moveTo(cx + c[0], cy + c[1]);
    ctx.quadraticCurveTo(cx + (c[0] + c[2]) / 2, cy + (c[1] + c[3]) / 2 - 2, cx + c[2], cy + c[3]);
    ctx.stroke();
  }
  ctx.lineCap = "butt";
  ctx.restore();
}

function drawDetailedBeard(cx, cy, r) {
  ctx.fillStyle = TC.beard;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 3;

  function traceBeard() {
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.92, cy - r * 0.20);
    ctx.lineTo(cx - r * 0.92, cy + r * 0.10);
    ctx.bezierCurveTo(cx - r * 0.98, cy + r * 0.45, cx - r * 0.82, cy + r * 0.78, cx - r * 0.55, cy + r * 0.97);
    ctx.bezierCurveTo(cx - r * 0.25, cy + r * 1.12, cx + r * 0.25, cy + r * 1.12, cx + r * 0.55, cy + r * 0.97);
    ctx.bezierCurveTo(cx + r * 0.82, cy + r * 0.78, cx + r * 0.98, cy + r * 0.45, cx + r * 0.92, cy + r * 0.10);
    ctx.lineTo(cx + r * 0.92, cy - r * 0.20);
    // inner cut to make mouth gap
    ctx.lineTo(cx + r * 0.75, cy + r * 0.05);
    ctx.lineTo(cx + r * 0.50, cy + r * 0.14);
    ctx.lineTo(cx + r * 0.38, cy + r * 0.20);
    ctx.lineTo(cx + r * 0.30, cy + r * 0.31);
    ctx.lineTo(cx - r * 0.30, cy + r * 0.31);
    ctx.lineTo(cx - r * 0.38, cy + r * 0.20);
    ctx.lineTo(cx - r * 0.50, cy + r * 0.14);
    ctx.lineTo(cx - r * 0.75, cy + r * 0.05);
    ctx.closePath();
  }
  traceBeard();
  ctx.fill(); ctx.stroke();

  // shading
  ctx.save();
  traceBeard();
  ctx.clip();
  // shadow under chin
  ctx.fillStyle = TC.beardEdge;
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 1.02, r * 0.55, r * 0.14, 0, 0, Math.PI * 2);
  ctx.fill();
  // right-side darker
  ctx.fillStyle = "rgba(0,0,0,0.32)";
  ctx.fillRect(cx + r * 0.30, cy, r * 0.70, r * 1.20);

  // strand texture
  ctx.strokeStyle = TC.beardHigh;
  ctx.lineWidth = 1.3;
  const strands = [
    [-r * 0.55, r * 0.45, -r * 0.45, r * 0.70],
    [-r * 0.36, r * 0.55, -r * 0.28, r * 0.86],
    [-r * 0.14, r * 0.55, -r * 0.07, r * 0.92],
    [r * 0.10, r * 0.55, r * 0.05, r * 0.94],
    [r * 0.28, r * 0.55, r * 0.22, r * 0.88],
    [r * 0.46, r * 0.50, r * 0.40, r * 0.75],
    [-r * 0.72, r * 0.30, -r * 0.68, r * 0.55],
    [r * 0.72, r * 0.30, r * 0.68, r * 0.55],
    [-r * 0.22, r * 0.95, -r * 0.18, r * 1.10],
    [r * 0.22, r * 0.95, r * 0.18, r * 1.10],
    [0, r * 0.96, 0, r * 1.12]
  ];
  for (const s of strands) {
    ctx.beginPath();
    ctx.moveTo(cx + s[0], cy + s[1]);
    ctx.lineTo(cx + s[2], cy + s[3]);
    ctx.stroke();
  }
  ctx.restore();

  // outer fuzz along silhouette
  ctx.strokeStyle = TC.beard;
  ctx.lineWidth = 1.5;
  const fuzz = [
    [-r * 0.95, r * 0.20, -r * 1.04, r * 0.22],
    [-r * 0.92, r * 0.42, -r * 1.04, r * 0.46],
    [-r * 0.78, r * 0.70, -r * 0.87, r * 0.79],
    [-r * 0.55, r * 0.98, -r * 0.62, r * 1.08],
    [-r * 0.25, r * 1.12, -r * 0.25, r * 1.20],
    [r * 0.0, r * 1.13, 0, r * 1.21],
    [r * 0.25, r * 1.12, r * 0.25, r * 1.20],
    [r * 0.55, r * 0.98, r * 0.62, r * 1.08],
    [r * 0.78, r * 0.70, r * 0.87, r * 0.79],
    [r * 0.92, r * 0.42, r * 1.04, r * 0.46],
    [r * 0.95, r * 0.20, r * 1.04, r * 0.22]
  ];
  for (const f of fuzz) {
    ctx.beginPath();
    ctx.moveTo(cx + f[0], cy + f[1]);
    ctx.lineTo(cx + f[2], cy + f[3]);
    ctx.stroke();
  }
}

function drawDetailedFace(cx, cy, r, t) {
  // eyebrows
  ctx.fillStyle = TC.beard;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 2;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(cx + r * 0.58 * s, cy - r * 0.32);
    ctx.bezierCurveTo(
      cx + r * 0.45 * s, cy - r * 0.45,
      cx + r * 0.25 * s, cy - r * 0.42,
      cx + r * 0.13 * s, cy - r * 0.35
    );
    ctx.lineTo(cx + r * 0.13 * s, cy - r * 0.27);
    ctx.bezierCurveTo(
      cx + r * 0.30 * s, cy - r * 0.34,
      cx + r * 0.45 * s, cy - r * 0.36,
      cx + r * 0.58 * s, cy - r * 0.25
    );
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  // eyebrow hair strokes
  ctx.strokeStyle = TC.hairShade;
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const lx = -r * 0.55 + i * r * 0.07;
    ctx.beginPath();
    ctx.moveTo(cx + lx, cy - r * 0.32);
    ctx.lineTo(cx + lx + 1, cy - r * 0.37);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - lx, cy - r * 0.32);
    ctx.lineTo(cx - lx - 1, cy - r * 0.37);
    ctx.stroke();
  }

  // eye socket shadow
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.34 * s, cy - r * 0.17, r * 0.20, r * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // eyes
  for (const s of [-1, 1]) {
    // white
    ctx.fillStyle = "#FFFFFF";
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.34 * s, cy - r * 0.15, r * 0.18, r * 0.12, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // iris outer
    ctx.fillStyle = "#5A3A20";
    ctx.beginPath();
    ctx.arc(cx + r * 0.34 * s + (s > 0 ? r * 0.02 : -r * 0.02), cy - r * 0.15, r * 0.10, 0, Math.PI * 2);
    ctx.fill();
    // iris inner ring
    ctx.fillStyle = "#3F2715";
    ctx.beginPath();
    ctx.arc(cx + r * 0.34 * s + (s > 0 ? r * 0.02 : -r * 0.02), cy - r * 0.15, r * 0.07, 0, Math.PI * 2);
    ctx.fill();
    // pupil
    ctx.fillStyle = TC.outline;
    ctx.beginPath();
    ctx.arc(cx + r * 0.34 * s + (s > 0 ? r * 0.02 : -r * 0.02), cy - r * 0.15, r * 0.045, 0, Math.PI * 2);
    ctx.fill();
    // catchlight
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.arc(cx + r * 0.34 * s + (s > 0 ? r * 0.05 : 0.01), cy - r * 0.18, r * 0.03, 0, Math.PI * 2);
    ctx.fill();
    // eyelid line thicker
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 2.8;
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.34 * s, cy - r * 0.15, r * 0.18, r * 0.12, 0, Math.PI * 1.05, Math.PI * 2);
    ctx.stroke();
  }
  ctx.lineWidth = 2;

  // nose
  // bridge subtle line
  ctx.strokeStyle = TC.skinShade;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx + 2, cy - r * 0.06);
  ctx.quadraticCurveTo(cx + 5, cy + r * 0.06, cx + 3, cy + r * 0.14);
  ctx.stroke();
  // bulb
  ctx.fillStyle = TC.skinShade;
  ctx.beginPath();
  ctx.ellipse(cx + 1, cy + r * 0.14, r * 0.10, r * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  // nostrils
  ctx.fillStyle = TC.skinDeep;
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.06, cy + r * 0.16, 1.4, 1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.08, cy + r * 0.16, 1.4, 1, 0, 0, Math.PI * 2);
  ctx.fill();
  // nose left highlight
  ctx.fillStyle = TC.skinHigh;
  ctx.beginPath();
  ctx.ellipse(cx - r * 0.03, cy - r * 0.01, r * 0.025, r * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();

  // mouth
  if (t.anim === "munch") {
    ctx.fillStyle = "#3D1A10";
    ctx.beginPath();
    ctx.ellipse(cx, cy + r * 0.46, r * 0.22, r * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.fillStyle = "#C84A4A";
    ctx.beginPath();
    ctx.ellipse(cx, cy + r * 0.51, r * 0.12, r * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(cx - r * 0.18, cy + r * 0.36, r * 0.36, r * 0.05);
  } else if (t.anim === "shirt-lift") {
    ctx.fillStyle = "#3D1A10";
    ctx.beginPath();
    ctx.ellipse(cx, cy + r * 0.43, r * 0.13, r * 0.10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  } else {
    // warm wide smile
    // dark interior
    ctx.fillStyle = "#3D1A10";
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.30, cy + r * 0.33);
    ctx.bezierCurveTo(
      cx - r * 0.15, cy + r * 0.60,
      cx + r * 0.15, cy + r * 0.60,
      cx + r * 0.30, cy + r * 0.33
    );
    ctx.bezierCurveTo(
      cx + r * 0.15, cy + r * 0.42,
      cx - r * 0.15, cy + r * 0.42,
      cx - r * 0.30, cy + r * 0.33
    );
    ctx.closePath();
    ctx.fill();
    // teeth
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.26, cy + r * 0.35);
    ctx.bezierCurveTo(
      cx - r * 0.13, cy + r * 0.53,
      cx + r * 0.13, cy + r * 0.53,
      cx + r * 0.26, cy + r * 0.35
    );
    ctx.bezierCurveTo(
      cx + r * 0.13, cy + r * 0.43,
      cx - r * 0.13, cy + r * 0.43,
      cx - r * 0.26, cy + r * 0.35
    );
    ctx.closePath();
    ctx.fill();
    // tooth separators
    ctx.strokeStyle = "rgba(0,0,0,0.30)";
    ctx.lineWidth = 1;
    for (let i = -2; i <= 2; i++) {
      if (i === 0) continue;
      const px = cx + i * r * 0.08;
      ctx.beginPath();
      ctx.moveTo(px, cy + r * 0.36);
      ctx.lineTo(px, cy + r * 0.46);
      ctx.stroke();
    }
    // gum shadow under teeth
    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.24, cy + r * 0.44);
    ctx.bezierCurveTo(
      cx - r * 0.12, cy + r * 0.51,
      cx + r * 0.12, cy + r * 0.51,
      cx + r * 0.24, cy + r * 0.44
    );
    ctx.lineTo(cx + r * 0.24, cy + r * 0.46);
    ctx.bezierCurveTo(
      cx + r * 0.12, cy + r * 0.53,
      cx - r * 0.12, cy + r * 0.53,
      cx - r * 0.24, cy + r * 0.46
    );
    ctx.closePath();
    ctx.fill();
    // smile outline
    ctx.strokeStyle = TC.outline;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.30, cy + r * 0.33);
    ctx.bezierCurveTo(
      cx - r * 0.15, cy + r * 0.60,
      cx + r * 0.15, cy + r * 0.60,
      cx + r * 0.30, cy + r * 0.33
    );
    ctx.stroke();
    // upper lip line
    ctx.strokeStyle = "rgba(80,40,30,0.6)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.30, cy + r * 0.33);
    ctx.bezierCurveTo(
      cx - r * 0.10, cy + r * 0.30,
      cx + r * 0.10, cy + r * 0.30,
      cx + r * 0.30, cy + r * 0.33
    );
    ctx.stroke();
    // dimple hints
    ctx.strokeStyle = "rgba(0,0,0,0.20)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx - r * 0.34, cy + r * 0.30, 3, 0, Math.PI * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx + r * 0.34, cy + r * 0.30, 3, Math.PI * 0.3, Math.PI);
    ctx.stroke();
  }
}

function drawMustache(cx, cy, r) {
  ctx.fillStyle = TC.beard;
  ctx.strokeStyle = TC.outline;
  ctx.lineWidth = 2;
  // left mustache
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.34, cy + r * 0.18);
  ctx.bezierCurveTo(
    cx - r * 0.24, cy + r * 0.14,
    cx - r * 0.10, cy + r * 0.20,
    cx - r * 0.04, cy + r * 0.28
  );
  ctx.lineTo(cx - r * 0.04, cy + r * 0.33);
  ctx.lineTo(cx - r * 0.34, cy + r * 0.33);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // right mustache
  ctx.beginPath();
  ctx.moveTo(cx + r * 0.34, cy + r * 0.18);
  ctx.bezierCurveTo(
    cx + r * 0.24, cy + r * 0.14,
    cx + r * 0.10, cy + r * 0.20,
    cx + r * 0.04, cy + r * 0.28
  );
  ctx.lineTo(cx + r * 0.04, cy + r * 0.33);
  ctx.lineTo(cx + r * 0.34, cy + r * 0.33);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // mustache hair strokes
  ctx.strokeStyle = TC.beardHigh;
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.30 + i * r * 0.06, cy + r * 0.22);
    ctx.lineTo(cx - r * 0.28 + i * r * 0.06, cy + r * 0.30);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + r * 0.30 - i * r * 0.06, cy + r * 0.22);
    ctx.lineTo(cx + r * 0.28 - i * r * 0.06, cy + r * 0.30);
    ctx.stroke();
  }
}

function drawThomasDrinking(x, y, halfW, t) {
  drawThomasNormal(x, y, halfW, { ...t, anim: "walk" });
  // overlay beer mug in hand region
  ctx.save();
  ctx.translate(x + halfW + 10, y - THOMAS_BODY_H * 0.45);
  drawBeerMug(0, 0);
  ctx.restore();
  // count text
  ctx.fillStyle = "#FFD976";
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 4;
  ctx.font = "900 38px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  const cs = game.cutscene;
  let counterText = "";
  if (!cs) counterText = "";
  else if (cs.gulp === 1) counterText = "1!";
  else if (cs.gulp === 2) counterText = "2!";
  else if (cs.gulp === 3) counterText = "3!";
  else counterText = "BURP!";
  ctx.strokeText(counterText, x, y - THOMAS_BODY_H - 30);
  ctx.fillText(counterText, x, y - THOMAS_BODY_H - 30);
  // weight tick number above
  if (cs) {
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 3;
    ctx.font = "900 18px Arial Black, Impact, sans-serif";
    const txt = "+" + cs.weightTickAdded + " kg";
    ctx.strokeText(txt, x, y - THOMAS_BODY_H - 70);
    ctx.fillText(txt, x, y - THOMAS_BODY_H - 70);
  }
}

function drawBeerMug(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "#F2B134";
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.rect(-11, -22, 22, 28);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(-7, -25, 6, 0, Math.PI * 2);
  ctx.arc(0, -28, 6, 0, Math.PI * 2);
  ctx.arc(7, -25, 6, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(15, -8, 7, -Math.PI / 2, Math.PI / 2);
  ctx.stroke();
  ctx.restore();
}

function drawThomasVictoryPose(x, y, halfW) {
  // simplified victory: normal pose, arms up implied by raising small fists above head
  drawThomasNormal(x, y, halfW, { ...game.thomas, anim: "walk", walkPhase: 0 });
  // hands up (fists)
  ctx.fillStyle = C.skin;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x - halfW - 4, y - THOMAS_BODY_H - 10, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + halfW + 4, y - THOMAS_BODY_H - 10, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
}

function drawThomasExplodingPose(x, y, halfW) {
  ctx.save();
  ctx.translate(x, y);
  const torsoH = 75;
  const torsoY = -28 - torsoH;
  ctx.fillStyle = C.shirtRed;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(0, torsoY + torsoH / 2, halfW * 1.3, torsoH / 2, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  const headSize = 40;
  const headY = torsoY - headSize - 2;
  ctx.fillStyle = C.skin;
  ctx.beginPath(); ctx.arc(0, headY, headSize, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-headSize * 0.32, headY - 2, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(headSize * 0.32, headY - 2, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = C.outline;
  ctx.beginPath(); ctx.arc(-headSize * 0.32, headY - 2, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(headSize * 0.32, headY - 2, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#3a1a0a";
  ctx.beginPath(); ctx.arc(0, headY + headSize * 0.4, 13, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ---------- Geometry helpers ----------
function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---------- Projectiles ----------
function drawProjectiles() {
  for (const p of game.projectiles) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.ang + Math.PI / 2);
    drawSyringe(0, 0, 1, false);
    ctx.restore();
  }
}

function drawSyringe(x, y, scale, showLabel) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  // needle
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.fillStyle = "#CCC";
  ctx.beginPath();
  ctx.moveTo(-2, -42);
  ctx.lineTo(2, -42);
  ctx.lineTo(2, -22);
  ctx.lineTo(-2, -22);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // needle tip diamond
  ctx.beginPath();
  ctx.moveTo(0, -46);
  ctx.lineTo(3, -42);
  ctx.lineTo(-3, -42);
  ctx.closePath();
  ctx.fillStyle = "#BBB";
  ctx.fill(); ctx.stroke();
  // cylinder
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.rect(-10, -22, 20, 30);
  ctx.fill(); ctx.stroke();
  // blue label
  ctx.fillStyle = C.ozempic;
  ctx.beginPath();
  ctx.rect(-10, -16, 20, 18);
  ctx.fill(); ctx.stroke();
  // OZEMPIC text on cylinder
  ctx.fillStyle = "#fff";
  ctx.font = "900 7px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("OZEMPIC", 0, -7);
  // plunger
  ctx.fillStyle = "#888";
  ctx.beginPath();
  ctx.rect(-8, 8, 16, 6);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.rect(-3, 14, 6, 10);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ---------- Pad / Pendulum ----------
function drawPad() {
  // base panel
  ctx.fillStyle = "#2A2A30";
  ctx.fillRect(0, PAD_TOP, LOGICAL_W, LOGICAL_H - PAD_TOP);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, PAD_TOP); ctx.lineTo(LOGICAL_W, PAD_TOP); ctx.stroke();
  // metallic strip
  ctx.fillStyle = "#404048";
  ctx.fillRect(0, PAD_TOP + 4, LOGICAL_W, 6);

  // big OZEMPIC label centered below pendulum
  drawOzempicLabel(PAD_CENTER_X, PAD_CENTER_Y + 50);

  // launcher base mount
  ctx.fillStyle = "#666";
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  roundedRect(PAD_CENTER_X - 60, PAD_CENTER_Y + 6, 120, 22, 8);
  ctx.fill(); ctx.stroke();
  // pivot
  ctx.beginPath();
  ctx.arc(PAD_CENTER_X, PAD_CENTER_Y, 14, 0, Math.PI * 2);
  ctx.fillStyle = "#888"; ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(PAD_CENTER_X, PAD_CENTER_Y, 5, 0, Math.PI * 2);
  ctx.fillStyle = "#444"; ctx.fill();

  // pendulum arm + syringe
  const ang = game.pendulum.angle - Math.PI / 2;
  ctx.save();
  ctx.translate(PAD_CENTER_X, PAD_CENTER_Y);
  ctx.rotate(ang + Math.PI / 2);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.fillStyle = "#AAA";
  ctx.beginPath();
  ctx.rect(-4, -PEND_LEN, 8, PEND_LEN);
  ctx.fill(); ctx.stroke();

  // Pulsing golden glow during rapid-fire (fades out in last 0.5s)
  if (game.rapidFireRemaining > 0) {
    const fade = clamp(game.rapidFireRemaining / 0.5, 0, 1);
    const pulse = 0.5 + 0.5 * Math.sin(game.time * 12);
    const glowR = 38 + pulse * 12;
    const grad = ctx.createRadialGradient(0, -PEND_LEN, 4, 0, -PEND_LEN, glowR);
    grad.addColorStop(0, "rgba(255, 215, 0, " + (0.85 * fade) + ")");
    grad.addColorStop(0.6, "rgba(255, 215, 0, " + (0.35 * fade) + ")");
    grad.addColorStop(1, "rgba(255, 215, 0, 0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, -PEND_LEN, glowR, 0, Math.PI * 2);
    ctx.fill();
  }

  if (game.pendulum.cooldownMs > 0 && !(game.rapidFireRemaining > 0)) ctx.globalAlpha = 0.4;
  drawSyringe(0, -PEND_LEN, 1.1, true);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawOzempicLabel(cx, cy) {
  // pill-shape blue plaque
  const w = 200, h = 42;
  ctx.fillStyle = C.ozempic;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 4;
  ctx.beginPath();
  roundedRect(cx - w / 2, cy - h / 2, w, h, h / 2);
  ctx.fill(); ctx.stroke();
  // text
  ctx.fillStyle = "#fff";
  ctx.font = "900 30px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("OZEMPIC", cx, cy + 1);
  // small subtitle
  ctx.font = "900 10px Arial Black, Impact, sans-serif";
  ctx.fillStyle = "#D8E5FF";
  ctx.fillText("INJECTIE", cx, cy - h / 2 - 8);
}

// ---------- Particles draw ----------
function drawParticles() {
  for (const p of game.particles) {
    ctx.fillStyle = p.color;
    const a = 1 - p.age / p.life;
    ctx.globalAlpha = clamp(a, 0, 1);
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ---------- HUD ----------
function drawHUD() {
  ctx.fillStyle = C.hudBg;
  ctx.fillRect(0, 0, LOGICAL_W, HUD_H);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, HUD_H); ctx.lineTo(LOGICAL_W, HUD_H); ctx.stroke();

  ctx.fillStyle = "#FFD976";
  ctx.font = "900 22px Arial Black, Impact, sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText("LEVEL " + game.level, 12, HUD_H / 2);

  const meterW = 220, meterH = 22;
  const meterX = LOGICAL_W / 2 - meterW / 2;
  const meterY = HUD_H / 2 - meterH / 2 - 6;
  ctx.fillStyle = "#444";
  ctx.fillRect(meterX, meterY, meterW, meterH);
  const w = game.thomas.weight;
  const t = clamp((w - 80) / 50, 0, 1);
  const color = t < 0.5 ? lerpColor(C.meterGreen, C.meterYellow, t * 2)
                        : lerpColor(C.meterYellow, C.meterRed, (t - 0.5) * 2);
  ctx.fillStyle = color;
  ctx.fillRect(meterX, meterY, meterW * t, meterH);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
  ctx.strokeRect(meterX, meterY, meterW, meterH);
  ctx.lineWidth = 3;

  ctx.fillStyle = "#9CFFB1";
  ctx.font = "900 11px Arial Black, Impact, sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("80", meterX, meterY + meterH + 8);
  ctx.fillStyle = "#FF9C9C";
  ctx.textAlign = "right";
  ctx.fillText("130", meterX + meterW, meterY + meterH + 8);
  ctx.fillStyle = "#fff";
  ctx.font = "900 16px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(Math.round(w) + " kg", LOGICAL_W / 2, meterY + meterH + 12);

  const hs = getHighscore();
  ctx.fillStyle = "#FFD976";
  ctx.font = "900 16px Arial Black, Impact, sans-serif";
  ctx.textAlign = "right";
  ctx.fillText("BEST: " + hs, LOGICAL_W - 12, HUD_H / 2);
}

function getHighscore() {
  try { const v = localStorage.getItem("thomas-ozempic-highscore"); return v ? parseInt(v, 10) : 0; }
  catch (e) { return 0; }
}
function setHighscoreIfBetter(level) {
  try { const cur = getHighscore(); if (level > cur) localStorage.setItem("thomas-ozempic-highscore", String(level)); }
  catch (e) {}
}

function lerpColor(c1, c2, t) {
  const a = parseHex(c1), b = parseHex(c2);
  return "rgb(" + Math.round(lerp(a[0], b[0], t)) + "," + Math.round(lerp(a[1], b[1], t)) + "," + Math.round(lerp(a[2], b[2], t)) + ")";
}
function parseHex(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}

function drawLevelClear() {
  for (const c of game.confetti) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-5, -3, 10, 6);
    ctx.restore();
  }
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  ctx.fillStyle = "#3ECF7A";
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 6;
  ctx.font = "900 56px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.strokeText("LEVEL " + game.level, LOGICAL_W / 2, LOGICAL_H / 2 - 60);
  ctx.fillText("LEVEL " + game.level, LOGICAL_W / 2, LOGICAL_H / 2 - 60);
  ctx.fillStyle = "#fff";
  ctx.strokeText("GEHAALD!", LOGICAL_W / 2, LOGICAL_H / 2 - 10);
  ctx.fillText("GEHAALD!", LOGICAL_W / 2, LOGICAL_H / 2 - 10);
  ctx.font = "900 22px Arial Black, Impact, sans-serif";
  ctx.lineWidth = 4;
  ctx.strokeText("TIK VOOR VOLGEND LEVEL", LOGICAL_W / 2, LOGICAL_H / 2 + 50);
  ctx.fillText("TIK VOOR VOLGEND LEVEL", LOGICAL_W / 2, LOGICAL_H / 2 + 50);
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
  ctx.fillStyle = "#E63946";
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 6;
  ctx.font = "900 64px Arial Black, Impact, sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.strokeText("GAME OVER", LOGICAL_W / 2, LOGICAL_H / 2 - 60);
  ctx.fillText("GAME OVER", LOGICAL_W / 2, LOGICAL_H / 2 - 60);
  ctx.fillStyle = "#fff";
  ctx.font = "900 22px Arial Black, Impact, sans-serif";
  ctx.lineWidth = 4;
  ctx.strokeText("THOMAS WOOG " + Math.round(game.thomas.weight) + " KG", LOGICAL_W / 2, LOGICAL_H / 2);
  ctx.fillText("THOMAS WOOG " + Math.round(game.thomas.weight) + " KG", LOGICAL_W / 2, LOGICAL_H / 2);
  ctx.strokeText("LEVEL " + game.level, LOGICAL_W / 2, LOGICAL_H / 2 + 30);
  ctx.fillText("LEVEL " + game.level, LOGICAL_W / 2, LOGICAL_H / 2 + 30);
  ctx.strokeText("TIK OM OPNIEUW TE BEGINNEN", LOGICAL_W / 2, LOGICAL_H / 2 + 80);
  ctx.fillText("TIK OM OPNIEUW TE BEGINNEN", LOGICAL_W / 2, LOGICAL_H / 2 + 80);
}
